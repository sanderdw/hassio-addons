server {
    listen 8099;
    allow  172.30.32.2;
    deny   all;

    client_max_body_size 0;
    proxy_buffering off;

    # Disable gzip from upstream so sub_filter can modify HTML
    proxy_set_header Accept-Encoding "";

    # Re-compress responses for the client
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_proxied any;

    # Inject ingress URL rewriting script into HTML responses
    sub_filter_types text/html;
    sub_filter_once on;
    sub_filter '</head>' '<script src="%%ingress_entry%%/ingress.js"></script></head>';

    # Allow loading in Home Assistant iframe
    proxy_hide_header X-Frame-Options;
    proxy_hide_header Content-Security-Policy;

    # Rewrite redirects and cookie paths for ingress
    proxy_redirect http://127.0.0.1:3000/ %%ingress_entry%%/;
    proxy_redirect / %%ingress_entry%%/;
    proxy_cookie_path / %%ingress_entry%%/;

    # Serve the ingress patch script
    location = /ingress.js {
        alias /usr/share/ingress/patch.js;
        default_type application/javascript;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
