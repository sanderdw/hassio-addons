server {
    listen 8099;
    allow  172.30.32.2;
    deny   all;

    client_max_body_size 0;
    proxy_buffering off;

    # Disable content-encoding from upstream so sub_filter can inspect responses
    proxy_set_header Accept-Encoding "";

    # Re-compress for the client
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_proxied any;

    # Apply sub_filter to HTML, CSS, and JS (for CSS-in-JS font declarations)
    sub_filter_types text/html text/css application/javascript;
    sub_filter_once off;

    # Inject ingress URL rewriting script into HTML
    sub_filter '</head>' '<script src="%%ingress_entry%%/ingress.js"></script></head>';

    # Rewrite absolute paths in HTML attributes
    sub_filter 'src="/' 'src="%%ingress_entry%%/';
    sub_filter 'href="/' 'href="%%ingress_entry%%/';

    # Rewrite CSS url() references (fonts, images, etc.)
    sub_filter 'url(/' 'url(%%ingress_entry%%/';
    sub_filter 'url("/' 'url("%%ingress_entry%%/';
    sub_filter "url('/" "url('%%ingress_entry%%/";

    # Allow loading in Home Assistant iframe
    proxy_hide_header X-Frame-Options;
    proxy_hide_header Content-Security-Policy;

    # Rewrite redirects and cookie paths for ingress
    proxy_redirect http://127.0.0.1:3000/ %%ingress_entry%%/;
    proxy_redirect / %%ingress_entry%%/;
    proxy_cookie_path / %%ingress_entry%%/;

    # Serve the ingress patch script
    location = /ingress.js {
        alias /usr/share/ingress/patch.js;
        default_type application/javascript;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
