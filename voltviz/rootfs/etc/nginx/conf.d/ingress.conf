server {
    listen 8099;
    allow  172.30.32.2;
    deny   all;

    root /usr/share/nginx/html;
    index index.html;

    # Rewrite absolute paths to relative for Home Assistant Ingress support
    sub_filter_types text/html;
    sub_filter_once off;
    sub_filter 'href="/' 'href="./';
    sub_filter 'src="/' 'src="./';

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Optional Sendspin proxy config (generated by run.sh)
    include /etc/nginx/addon.d/*.conf;
}
